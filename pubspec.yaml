name: ubicacion_app
description: App de ubicacion en tiempo real
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_database: ^11.0.0
  geolocator: ^14.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  android_alarm_manager_plus: ^5.0.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
